name: Live Home Blockers Verification Gate

on:
  workflow_dispatch:

jobs:
  verify-live-home-blockers:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize gate report
        shell: bash
        run: |
          set -euo pipefail
          cat > live-home-blockers-report.md <<'EOF'
          # MAWAEEDAK LIVE HOME BLOCKERS VERIFICATION REPORT

          ## 1. Executive Verdict

          Pending.
          EOF

      - name: Worktree and Git integrity
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Worktree and Git Integrity"
            echo '```text'
            git status --short || true
            echo
            git diff --stat || true
            echo
            git diff --name-status || true
            echo
            git fsck --full
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify required live secrets without exposing values
        shell: bash
        run: |
          set -euo pipefail
          required=(
            DATABASE_URL
            VITE_SUPABASE_URL
            VITE_SUPABASE_ANON_KEY
            SUPABASE_URL
            SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            SESSION_SECRET
            JWT_SECRET
            ADMIN_API_TOKEN
          )

          missing=0
          {
            echo "## Environment Verification"
            echo "| Variable | Status |"
            echo "|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "❌ $name is missing"
              echo "| $name | MISSING |" >> "$GITHUB_STEP_SUMMARY"
              missing=1
            else
              echo "✅ $name is present"
              echo "| $name | PRESENT |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "NEEDS FIXES — LIVE ENV SECRETS NOT AVAILABLE" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Verify service-role key is not exposed to frontend runtime
        shell: bash
        run: |
          set -euo pipefail
          if grep -R "VITE_SUPABASE_SERVICE_ROLE_KEY\|import\.meta\.env\.SUPABASE_SERVICE_ROLE_KEY\|process\.env\.SUPABASE_SERVICE_ROLE_KEY" \
            artifacts/mawaeedak/src artifacts/mawaeedak \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude='*.md' \
            2>/dev/null; then
            echo "❌ Frontend runtime references Supabase service-role key."
            exit 1
          fi
          echo "✅ No frontend runtime exposure of SUPABASE_SERVICE_ROLE_KEY found." >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack and pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.5.0 --activate
          pnpm --version

      - name: Install dependencies
        env:
          CI: "false"
          npm_config_ignore_scripts: "false"
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Install live verification clients
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client jq curl

      - name: Database connection and schema proof
        shell: bash
        run: |
          set -euo pipefail
          echo "## Database Proof" >> "$GITHUB_STEP_SUMMARY"

          # GitHub-hosted runners do not reliably reach Supabase's direct IPv6 DB endpoint.
          # If the secret is the direct URL, derive an equivalent IPv4-compatible Supabase
          # Transaction Pooler URL at runtime without printing any secret values.
          python3 - <<'PY' > /tmp/effective_database_url
          import os
          import urllib.parse

          database_url = os.environ["DATABASE_URL"]
          supabase_url = os.environ["SUPABASE_URL"].rstrip("/")
          project_ref = urllib.parse.urlsplit(supabase_url).hostname.split(".")[0]
          parsed = urllib.parse.urlsplit(database_url)
          host = parsed.hostname or ""

          if parsed.scheme in {"postgres", "postgresql"} and parsed.username == "postgres" and host == f"db.{project_ref}.supabase.co" and parsed.port == 5432:
              raw_userinfo = parsed.netloc.rsplit("@", 1)[0]
              raw_password = raw_userinfo.split(":", 1)[1] if ":" in raw_userinfo else ""
              print(f"postgresql://postgres.{project_ref}:{raw_password}@aws-0-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require")
          else:
              print(database_url)
          PY

          EFFECTIVE_DATABASE_URL="$(cat /tmp/effective_database_url)"
          if [[ "$EFFECTIVE_DATABASE_URL" != "$DATABASE_URL" ]]; then
            echo "ℹ️ DATABASE_URL normalized from direct Supabase host to Transaction Pooler for GitHub Actions connectivity." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ DATABASE_URL used as provided." >> "$GITHUB_STEP_SUMMARY"
          fi

          db_name="$(psql "$EFFECTIVE_DATABASE_URL" -v ON_ERROR_STOP=1 -Atc "select current_database();")"
          db_user="$(psql "$EFFECTIVE_DATABASE_URL" -v ON_ERROR_STOP=1 -Atc "select current_user;")"
          echo "✅ DB reachable." >> "$GITHUB_STEP_SUMMARY"
          echo "- Database: ${db_name}" >> "$GITHUB_STEP_SUMMARY"
          echo "- User: ${db_user}" >> "$GITHUB_STEP_SUMMARY"

          mapfile -t existing_tables < <(psql "$EFFECTIVE_DATABASE_URL" -v ON_ERROR_STOP=1 -Atc "select table_name from information_schema.tables where table_schema='public' order by table_name;")
          printf '%s\n' "${existing_tables[@]}" > /tmp/live_tables.txt

          echo "### Public tables found" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/live_tables.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          required_any_identity=(profiles users user_profiles)
          required_core=(financial_events notifications daily_messages audit_logs)
          missing=0

          has_table() { grep -Fxq "$1" /tmp/live_tables.txt; }

          identity_found=0
          for t in "${required_any_identity[@]}"; do
            if has_table "$t"; then identity_found=1; fi
          done
          if [ "$identity_found" -ne 1 ]; then
            echo "❌ Missing identity table: expected one of profiles/users/user_profiles" >> "$GITHUB_STEP_SUMMARY"
            missing=1
          else
            echo "✅ Identity table exists." >> "$GITHUB_STEP_SUMMARY"
          fi

          for t in "${required_core[@]}"; do
            if has_table "$t"; then
              echo "✅ Table exists: $t" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "❌ Missing table: $t" >> "$GITHUB_STEP_SUMMARY"
              missing=1
            fi
          done

          override_found=0
          for t in official_financial_overrides financial_overrides admin_financial_overrides; do
            if has_table "$t"; then override_found=1; echo "✅ Override table exists: $t" >> "$GITHUB_STEP_SUMMARY"; fi
          done
          if [ "$override_found" -ne 1 ]; then
            echo "❌ Missing official financial override table/equivalent." >> "$GITHUB_STEP_SUMMARY"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "NEEDS FIXES — LIVE DATABASE SCHEMA INCOMPLETE" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Supabase REST and RLS surface smoke
        shell: bash
        run: |
          set -euo pipefail
          base="${SUPABASE_URL%/}"
          echo "## Supabase REST/RLS Smoke" >> "$GITHUB_STEP_SUMMARY"

          code="$(curl -sS -o /tmp/supabase_rest.json -w '%{http_code}' \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$base/rest/v1/financial_events?select=*&limit=1")"

          echo "- financial_events anon read HTTP status: $code" >> "$GITHUB_STEP_SUMMARY"
          if [ "$code" -lt 200 ] || [ "$code" -ge 500 ]; then
            echo "NEEDS FIXES — SUPABASE REST SMOKE FAILED" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          mutation_code="$(curl -sS -o /tmp/supabase_mutation.json -w '%{http_code}' \
            -X POST \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"gate_probe":"guest_should_not_write"}' \
            "$base/rest/v1/official_financial_overrides")"

          echo "- guest official override mutation HTTP status: $mutation_code" >> "$GITHUB_STEP_SUMMARY"
          if [ "$mutation_code" = "200" ] || [ "$mutation_code" = "201" ] || [ "$mutation_code" = "204" ]; then
            echo "❌ Guest/anon mutation unexpectedly succeeded." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ Guest/anon mutation blocked." >> "$GITHUB_STEP_SUMMARY"

      - name: Repository consistency scans
        shell: bash
        run: |
          set -euo pipefail
          echo "## Repository Consistency Scans" >> "$GITHUB_STEP_SUMMARY"

          echo "### Financial resolver references" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          grep -R "financial.*resolver\|resolve.*financial\|official_announcement\|admin_verified_override\|rule_based\|fallback\|financial_events\|override" -n artifacts lib --exclude-dir=node_modules --exclude-dir=dist || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          echo "### Saudi timezone references" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          grep -R "Asia/Riyadh\|Riyadh\|midnight\|stale" -n artifacts lib --exclude-dir=node_modules --exclude-dir=dist || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Final live gate decision
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Final Decision"
            echo "PASSED — LIVE HOME BLOCKERS VERIFIED BY GITHUB ACTIONS BASELINE"
            echo
            echo "Note: This workflow proves env availability, install/typecheck/build, DB reachability, required table presence, Supabase REST availability, and guest override mutation blocking. If admin-authenticated mutation tests require real admin credentials/session, keep that as a separate manual QA proof."
          } >> "$GITHUB_STEP_SUMMARY"

