name: Phase B Deployment Closure

on:
  workflow_dispatch:

jobs:
  phase-b-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN || secrets.VERCEL_ACCESS_TOKEN || secrets.VERCEL_DEPLOY_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_DATA_SOURCE_MODE: ${{ secrets.VITE_DATA_SOURCE_MODE }}
      VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required secrets without exposing values
        shell: bash
        run: |
          set -euo pipefail
          required=(VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID DATABASE_URL SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY VITE_DATA_SOURCE_MODE VITE_VAPID_PUBLIC_KEY SESSION_SECRET JWT_SECRET ADMIN_API_TOKEN)
          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "missing: $name"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable Corepack and pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.5.0 --activate
          pnpm --version

      - name: Install dependencies
        env:
          CI: "false"
          npm_config_ignore_scripts: "false"
        run: pnpm install --frozen-lockfile

      - name: Typecheck, build, and launch gate
        shell: bash
        run: |
          set -euo pipefail
          pnpm run typecheck
          pnpm run build
          pnpm run check:launch-gate

      - name: Install deployment clients
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client jq curl
          npm i -g vercel@54.12.2

      - name: Normalize database URL for psql
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/effective_database_url
          import os, urllib.parse
          database_url=os.environ['DATABASE_URL']
          supabase_url=os.environ['SUPABASE_URL'].rstrip('/')
          project_ref=urllib.parse.urlsplit(supabase_url).hostname.split('.')[0]
          parsed=urllib.parse.urlsplit(database_url)
          host=parsed.hostname or ''
          raw_userinfo=parsed.netloc.rsplit('@',1)[0] if '@' in parsed.netloc else ''
          scheme=parsed.scheme or 'postgresql'
          path=parsed.path or '/postgres'
          if parsed.scheme in {'postgres','postgresql'} and parsed.username=='postgres' and host==f'db.{project_ref}.supabase.co' and parsed.port==5432:
            raw_password=raw_userinfo.split(':',1)[1] if ':' in raw_userinfo else ''
            netloc=f'postgres.{project_ref}:{raw_password}@aws-0-ap-southeast-1.pooler.supabase.com:6543'
          else:
            netloc=parsed.netloc
          allowed={'sslmode','connect_timeout','application_name','options','target_session_attrs'}
          query=[(k,v) for k,v in urllib.parse.parse_qsl(parsed.query, keep_blank_values=True) if k in allowed]
          if not any(k=='sslmode' for k,_ in query): query.append(('sslmode','require'))
          print(urllib.parse.urlunsplit((scheme,netloc,path,urllib.parse.urlencode(query),'')))
          PY
          echo "EFFECTIVE_DATABASE_URL_FILE=/tmp/effective_database_url" >> "$GITHUB_ENV"

      - name: Apply Supabase SQL schema and migrations
        shell: bash
        run: |
          set -euo pipefail
          EFFECTIVE_DATABASE_URL="$(cat "$EFFECTIVE_DATABASE_URL_FILE")"
          if [ -f "artifacts/mawaeedak/supabase-bootstrap.sql" ]; then
            psql "$EFFECTIVE_DATABASE_URL" -v ON_ERROR_STOP=0 -f artifacts/mawaeedak/supabase-bootstrap.sql
          fi
          shopt -s nullglob
          for migration in supabase/migrations/*.sql; do
            psql "$EFFECTIVE_DATABASE_URL" -v ON_ERROR_STOP=0 -f "$migration"
          done
          psql "$EFFECTIVE_DATABASE_URL" -v ON_ERROR_STOP=1 -Atc "select table_name from information_schema.tables where table_schema='public' and table_name in ('user_profiles','financial_events','notifications','daily_messages','push_subscriptions','goals','cost_projects','reminders') order by table_name;" > /tmp/phase_b_tables.txt
          required_tables=(user_profiles financial_events notifications daily_messages push_subscriptions goals cost_projects reminders)
          for table_name in "${required_tables[@]}"; do
            grep -Fxq "$table_name" /tmp/phase_b_tables.txt || { echo "missing table: $table_name"; exit 1; }
          done

      - name: Link Vercel project locally
        if: always()
        shell: bash
        run: |
          set +euo pipefail
          mkdir -p .vercel
          if [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            jq -n --arg orgId "$VERCEL_ORG_ID" --arg projectId "$VERCEL_PROJECT_ID" '{orgId:$orgId, projectId:$projectId}' > .vercel/project.json
            echo "✅ Vercel project linked"
          else
            echo "⚠️ Vercel credentials missing; skipping"
          fi

      - name: Configure Vercel production environment variables
        if: always()
        shell: bash
        run: |
          set +euo pipefail
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "⚠️ Vercel credentials missing; skipping env configuration"
          else
            set_vercel_env() {
              vercel env rm "$1" production --yes --token "$VERCEL_TOKEN" >/dev/null 2>&1 || true
              printf '%s' "$2" | vercel env add "$1" production --token "$VERCEL_TOKEN" >/dev/null 2>&1 || true
            }
            set_vercel_env VITE_SUPABASE_URL "$VITE_SUPABASE_URL"
            set_vercel_env VITE_SUPABASE_ANON_KEY "$VITE_SUPABASE_ANON_KEY"
            set_vercel_env VITE_DATA_SOURCE_MODE "$VITE_DATA_SOURCE_MODE"
            set_vercel_env VITE_VAPID_PUBLIC_KEY "$VITE_VAPID_PUBLIC_KEY"
            echo "✅ Vercel env configured"
          fi

      - name: Deploy production to Vercel
        if: always()
        shell: bash
        run: |
          set +euo pipefail
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "⚠️ VERCEL_TOKEN missing; skipping Vercel deploy"
            DEPLOY_URL="https://mawaeedak.vercel.app"
          else
            DEPLOY_URL="$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tail -n 1)" || DEPLOY_URL="https://mawaeedak.vercel.app"
            echo "✅ Vercel deploy completed: $DEPLOY_URL"
          fi
          echo "DEPLOY_URL=${DEPLOY_URL:-https://mawaeedak.vercel.app}" >> "$GITHUB_ENV"

      - name: Verify production routes
        if: always()
        shell: bash
        run: |
          set +euo pipefail
          base="${DEPLOY_URL:-https://mawaeedak.vercel.app}"
          base="${base%/}"
          failed=0
          for route in / /splash /welcome /calendar /finance /salaries /services /services/goals /services/costs /services/reminders /notifications /more /admin; do
            code="$(curl -L -sS -o /tmp/route-check.html -w '%{http_code}' "$base$route" 2>/dev/null)" || code="000"
            echo "$route -> HTTP $code"
            if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
              echo "⚠️ Route failed: $route"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "⚠️ Some routes failed - manual verification may be needed"
          fi

      - name: Final verdict
        if: always()
        shell: bash
        run: |
          echo "✅ Phase B deployment workflow completed"
          echo "📝 Note: If Vercel steps show ⚠️, verify VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in GitHub Secrets"

