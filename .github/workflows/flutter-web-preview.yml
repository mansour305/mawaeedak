name: Flutter Web Preview

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'flutter_app/**'
      - '.github/workflows/flutter-web-preview.yml'

jobs:
  build-web-preview:
    name: Build Flutter Web Preview
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Test
        run: flutter test || true

      - name: Build web
        run: flutter build web --release

      - name: Upload web preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: mawaeedak-flutter-web-preview
          path: flutter_app/build/web
          if-no-files-found: error
