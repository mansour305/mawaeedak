kind = "web"
previewPath = "/"
title = "مواعيدك"
version = "1.0.0"
id = "artifacts/mawaeedak"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23640

[services.development]
run = "pnpm --filter @workspace/mawaeedak run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mawaeedak", "run", "build" ]
publicDir = "artifacts/mawaeedak/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23640"
BASE_PATH = "/"
