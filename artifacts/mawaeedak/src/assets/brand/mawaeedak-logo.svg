<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A063"/>
      <stop offset="100%" style="stop-color:#8A6B3D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#8A6B3D" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Logo Mark - Arabic Letter م -->
  <g filter="url(#shadow)">
    <!-- Circle Background -->
    <circle cx="60" cy="60" r="52" fill="#FAF7F2" stroke="url(#goldGrad)" stroke-width="2"/>
    <!-- Inner subtle border -->
    <circle cx="60" cy="60" r="46" fill="none" stroke="rgba(201,160,99,0.3)" stroke-width="1"/>
    
    <!-- Arabic Letter م (Mim) - Stylized -->
    <text x="60" y="82" 
          font-family="'Cairo', 'Noto Kufi Arabic', Arial, sans-serif" 
          font-size="56" 
          font-weight="700" 
          fill="url(#goldGrad)" 
          text-anchor="middle"
          direction="rtl">م</text>
    
    <!-- Decorative dot -->
    <circle cx="82" cy="30" r="4" fill="#C9A063"/>
  </g>
  
  <!-- Logo Text -->
  <text x="130" y="75" 
        font-family="'Cairo', 'Noto Kufi Arabic', Arial, sans-serif" 
        font-size="42" 
        font-weight="800" 
        fill="#8A6B3D"
        direction="rtl">مواعيدك</text>
</svg>