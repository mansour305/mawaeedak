name: mawaeedak_app
description: "تطبيق مواعيدك - خدمات المواعيد والرواتب والدعوم"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.19.0
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.1.0
  table_calendar: ^3.0.9
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.4
  connectivity_plus: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/backgrounds/
    - assets/patterns/
    - assets/icons/
